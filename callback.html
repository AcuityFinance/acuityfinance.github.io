<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Berhasil ~ Acuity Finance &copy; Money Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        @keyframes bg-flash {
            0%, 100% { background-color: #0f071a; }
            50% { background-color: #2a1147; }
        }
        body {
            background-color: #0f071a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(271,78%,15%,1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(285,62%,21%,1) 0px, transparent 50%);
            animation: bg-flash 4s infinite ease-in-out;
        }
        .glossy-panel {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.4), rgba(76, 29, 149, 0.6));
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glossy-box {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .glossy-box:active {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6));
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.6);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(216, 180, 254, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans text-gray-100 selection:bg-purple-500 selection:text-white">
    <div class="glossy-panel rounded-2xl p-8 max-w-md w-full text-center relative overflow-hidden transition-all duration-300 hover:shadow-[0_12px_40px_0_rgba(147,51,234,0.3)]">
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-400 rounded-full mix-blend-overlay filter blur-2xl opacity-60 pointer-events-none animate-pulse"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-600 rounded-full mix-blend-overlay filter blur-2xl opacity-60 pointer-events-none animate-pulse" style="animation-delay: 1.5s;"></div>
        <div class="relative z-10">
            <div class="mx-auto w-14 h-14 bg-gradient-to-br from-purple-400 to-purple-700 rounded-full flex items-center justify-center mb-5 shadow-lg shadow-purple-900/50 border border-purple-300/30">
                <svg class="w-7 h-7 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold mb-2 tracking-tight text-white text-glow">Aktivasi Berhasil!</h1>
            <p class="text-purple-200 text-sm mb-6 leading-relaxed opacity-90">
                Silahkan salin dan paste kode di bawah ini ke dalam Aplikasi <span class="font-semibold text-white">Acuity Finance</span>.
            </p>
            <div id="copyBox" class="glossy-box rounded-xl p-4 cursor-pointer group transition-all duration-200 relative">
                <div class="absolute top-2 right-2 opacity-50 group-hover:opacity-100 transition-opacity">
                    <svg class="w-4 h-4 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                    </svg>
                </div>
                <div class="pr-5">
                    <p id="urlCode" class="font-mono text-xs break-all text-purple-100 leading-tight text-left">Memuat URL...</p>
                </div>
            </div>
            <div id="copyMessage" class="mt-4 flex items-center justify-center gap-1.5 opacity-0 transition-opacity duration-300 h-5">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p class="text-green-400 text-xs font-medium">Tersalin ke Clipboard</p>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            const currentUrl = window.location.href;
            $('#urlCode').text(currentUrl);
            $('#copyBox').on('click', function() {
                const textToCopy = $('#urlCode').text();
                $(this).css('transform', 'scale(0.97)');
                setTimeout(() => {
                    $(this).css('transform', 'scale(1)');
                }, 150);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(textToCopy).then(showSuccess);
                } else {
                    let textArea = document.createElement('textarea');
                    textArea.value = textToCopy;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    textArea.style.top = '-999999px';
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showSuccess();
                    } catch (err) {
                        console.error('Gagal menyalin text', err);
                    }
                    textArea.remove();
                }
            });
            let timeoutId;
            function showSuccess() {
                clearTimeout(timeoutId);
                $('#copyMessage').css('opacity', '1');
                timeoutId = setTimeout(function() {
                    $('#copyMessage').css('opacity', '0');
                }, 2500);
            }
        });
    </script>
</body>
</html>
