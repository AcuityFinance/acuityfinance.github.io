<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Berhasil ~ Acuity Finance &copy; Money Manager</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        @keyframes bg-flash {
            0%, 100% { background-color: #0f071a; }
            50% { background-color: #2a1147; }
        }
        body {
            background-color: #0f071a;
            background-image:
                radial-gradient(at 0% 0%, hsla(271,78%,15%,1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(285,62%,21%,1) 0px, transparent 50%);
            animation: bg-flash 4s infinite ease-in-out;
        }
        .glossy-panel {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.4), rgba(76, 29, 149, 0.6));
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glossy-box {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .glossy-box:active {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6));
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.6);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(216, 180, 254, 0.4);
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4 font-sans text-gray-100 selection:bg-purple-500 selection:text-white overflow-hidden">
    <div class="absolute inset-0 w-full h-full z-0 pointer-events-none flex items-center justify-center">
        <dotlottie-player src="./index.lottie" background="transparent" speed="1" style="width: 100%; height: 100%;" loop autoplay></dotlottie-player>
    </div>
    <div class="glossy-panel rounded-2xl p-8 max-w-md w-full text-center relative z-10 overflow-hidden transition-all duration-300 hover:shadow-[0_12px_40px_0_rgba(147,51,234,0.3)]">
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-400 rounded-full mix-blend-overlay filter blur-2xl opacity-60 pointer-events-none animate-pulse"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-600 rounded-full mix-blend-overlay filter blur-2xl opacity-60 pointer-events-none animate-pulse" style="animation-delay: 1.5s;"></div>
        <div class="relative z-20">
            <div class="mx-auto flex items-center justify-center mb-5">
                <img src="./icon.png" alt="Acuity Finance Icon" class="w-16 h-16 drop-shadow-[0_8px_16px_rgba(147,51,234,0.4)] object-contain">
            </div>
            <h1 class="text-2xl font-bold mb-2 tracking-tight text-white text-glow">Acuity Finance</h1>
            <p class="text-purple-200 text-sm mb-6 leading-relaxed opacity-90">
                Financial Acuity, Sharp Insights for Smarter Wealth
            </p>
        </div>
    </div>
    <script>
        $(document).ready(function() {
        });
    </script>
</body>
</html>
